<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 卡板配货演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      color: #f1f5f9;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56, 189, 248, 0.3);
      max-width: 300px;
    }
    #info h3 {
      color: #38bdf8;
      margin-bottom: 12px;
      font-size: 16px;
    }
    #info .stat {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }
    #info .stat-label { color: #94a3b8; }
    #info .stat-value { color: #22d3ee; font-weight: 600; }
    #info .divider {
      height: 1px;
      background: rgba(56, 189, 248, 0.2);
      margin: 12px 0;
    }
    #pallet-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .pallet-item {
      padding: 8px 12px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 6px;
      margin-bottom: 6px;
      border-left: 3px solid #38bdf8;
    }
    .pallet-item-name {
      color: #38bdf8;
      font-weight: 600;
      font-size: 13px;
    }
    .pallet-item-info {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 2px;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #38bdf8;
      font-size: 18px;
    }
    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9);
      color: #94a3b8;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    #rotation-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      color: #f1f5f9;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56, 189, 248, 0.3);
      min-width: 200px;
    }
    #rotation-controls h4 {
      color: #38bdf8;
      margin-bottom: 12px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .control-row:last-child {
      margin-bottom: 0;
    }
    .control-label {
      color: #94a3b8;
      font-size: 12px;
      min-width: 50px;
    }
    .toggle-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
    }
    .toggle-btn.active {
      background: linear-gradient(135deg, #38bdf8, #22d3ee);
      color: #0f172a;
    }
    .toggle-btn.inactive {
      background: rgba(51, 65, 85, 0.8);
      color: #94a3b8;
    }
    .toggle-btn:hover {
      transform: translateY(-1px);
    }
    .speed-slider {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: rgba(51, 65, 85, 0.8);
      outline: none;
      -webkit-appearance: none;
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #38bdf8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .speed-slider::-webkit-slider-thumb:hover {
      background: #22d3ee;
      transform: scale(1.2);
    }
    .speed-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #38bdf8;
      cursor: pointer;
      border: none;
    }
    .speed-value {
      color: #22d3ee;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
      font-size: 12px;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">加载中...</div>
  <div id="info">
    <h3>📦 卡板配货演示</h3>
    <div class="stat">
      <span class="stat-label">卡板总数</span>
      <span class="stat-value" id="pallet-count">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">箱子总数</span>
      <span class="stat-value" id="box-count">0</span>
    </div>
    <div class="divider"></div>
    <div style="color: #94a3b8; font-size: 12px; margin-bottom: 6px;">卡板列表：</div>
    <div id="pallet-list"></div>
  </div>
  <div id="rotation-controls">
    <h4>🔄 自动旋转</h4>
    <div class="control-row">
      <button id="rotation-toggle" class="toggle-btn inactive" onclick="toggleRotation()">停止</button>
    </div>
    <div class="control-row">
      <span class="control-label">速度</span>
      <input type="range" id="rotation-speed" class="speed-slider" min="0.1" max="5" step="0.1" value="1" oninput="updateRotationSpeed(this.value)">
      <span class="speed-value" id="speed-value">1.0x</span>
    </div>
  </div>
  <div id="controls-hint">
    🖱️ 左键拖动旋转 | 右键拖动平移 | 滚轮缩放
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 卡板尺寸（厘米）
    const PALLET_LENGTH = 120;  // X轴
    const PALLET_WIDTH = 100;   // Z轴
    const PALLET_HEIGHT = 15;   // Y轴
    const PALLET_SPACING = 50;  // 卡板之间的间距

    // 场景初始化
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.Fog(0x0a0a0f, 500, 2000);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(300, 300, 400);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // 光照 - 整体环境光提亮
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(200, 400, 200);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 4096;
    dirLight.shadow.mapSize.height = 4096;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 1500;
    dirLight.shadow.camera.left = -800;
    dirLight.shadow.camera.right = 800;
    dirLight.shadow.camera.top = 800;
    dirLight.shadow.camera.bottom = -800;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.4);
    fillLight.position.set(-200, 200, -200);
    scene.add(fillLight);

    // 地面
    const groundGeometry = new THREE.PlaneGeometry(3000, 3000);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x1a1a2e,
      roughness: 0.9,
      metalness: 0.1
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 网格
    const gridHelper = new THREE.GridHelper(2000, 100, 0x38bdf8, 0x1e293b);
    gridHelper.position.y = 0.1;
    scene.add(gridHelper);

    // 容器组
    const palletsGroup = new THREE.Group();
    scene.add(palletsGroup);

    // 创建逼真的木质卡板
    function createPallet() {
      const group = new THREE.Group();
      
      // 木材颜色
      const woodColor = 0xc4a574;
      const woodMaterial = new THREE.MeshStandardMaterial({
        color: woodColor,
        roughness: 0.8,
        metalness: 0.1
      });
      const darkWoodMaterial = new THREE.MeshStandardMaterial({
        color: 0x8b7355,
        roughness: 0.9,
        metalness: 0.05
      });

      // 卡板结构参数
      const boardThickness = 2;
      const topBoardWidth = 10;
      const bottomBoardWidth = 12;
      const blockSize = 10;
      const blockHeight = 8;

      // 顶部横向木板（7块）
      const topBoardCount = 7;
      const topSpacing = (PALLET_WIDTH - topBoardCount * topBoardWidth) / (topBoardCount - 1);
      for (let i = 0; i < topBoardCount; i++) {
        const board = new THREE.Mesh(
          new THREE.BoxGeometry(PALLET_LENGTH, boardThickness, topBoardWidth),
          woodMaterial
        );
        board.position.set(
          0,
          PALLET_HEIGHT - boardThickness / 2,
          -PALLET_WIDTH / 2 + topBoardWidth / 2 + i * (topBoardWidth + topSpacing)
        );
        board.castShadow = true;
        board.receiveShadow = true;
        group.add(board);
      }

      // 支撑块（3×3 = 9块）
      const blockPositionsX = [-PALLET_LENGTH / 2 + blockSize / 2 + 5, 0, PALLET_LENGTH / 2 - blockSize / 2 - 5];
      const blockPositionsZ = [-PALLET_WIDTH / 2 + blockSize / 2 + 5, 0, PALLET_WIDTH / 2 - blockSize / 2 - 5];
      
      for (const x of blockPositionsX) {
        for (const z of blockPositionsZ) {
          const block = new THREE.Mesh(
            new THREE.BoxGeometry(blockSize, blockHeight, blockSize),
            darkWoodMaterial
          );
          block.position.set(x, boardThickness + blockHeight / 2, z);
          block.castShadow = true;
          block.receiveShadow = true;
          group.add(block);
        }
      }

      // 中间纵向承重板（3块）
      for (let i = 0; i < 3; i++) {
        const x = blockPositionsX[i];
        const supportBoard = new THREE.Mesh(
          new THREE.BoxGeometry(bottomBoardWidth, boardThickness, PALLET_WIDTH),
          woodMaterial
        );
        supportBoard.position.set(x, boardThickness + blockHeight + boardThickness / 2, 0);
        supportBoard.castShadow = true;
        supportBoard.receiveShadow = true;
        group.add(supportBoard);
      }

      // 底部横向木板（3块）
      const bottomPositionsZ = [-PALLET_WIDTH / 2 + bottomBoardWidth / 2, 0, PALLET_WIDTH / 2 - bottomBoardWidth / 2];
      for (const z of bottomPositionsZ) {
        const board = new THREE.Mesh(
          new THREE.BoxGeometry(PALLET_LENGTH, boardThickness, bottomBoardWidth),
          woodMaterial
        );
        board.position.set(0, boardThickness / 2, z);
        board.castShadow = true;
        board.receiveShadow = true;
        group.add(board);
      }

      return group;
    }

    // 创建卡板编号标签
    function createPalletLabel(name, index) {
      const group = new THREE.Group();
      
      // 创建标签背景
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      
      // 绘制圆角矩形背景
      const radius = 20;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(512 - radius, 0);
      ctx.quadraticCurveTo(512, 0, 512, radius);
      ctx.lineTo(512, 256 - radius);
      ctx.quadraticCurveTo(512, 256, 512 - radius, 256);
      ctx.lineTo(radius, 256);
      ctx.quadraticCurveTo(0, 256, 0, 256 - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      
      ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
      ctx.fill();
      
      // 边框
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 4;
      ctx.stroke();
      
      // 名称（居中显示，字体更大）
      ctx.fillStyle = '#f1f5f9';
      ctx.font = 'bold 64px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(name, 256, 128);
      
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(80, 40, 1);
      
      group.add(sprite);
      return group;
    }

    // 创建高度计 - 透明亮色现代风格
    function createHeightGauge(totalHeight, maxHeight = 300) {
      const group = new THREE.Group();
      
      const tubeWidth = 3;  // 细管
      const tubeDepth = 3;
      const gaugeHeight = maxHeight;
      const baseHeight = 2;
      
      // 小底座（透明玻璃）
      const baseGeometry = new THREE.CylinderGeometry(6, 6, baseHeight, 16);
      const baseMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.3,
        roughness: 0.1,
        metalness: 0.9,
        emissive: 0x88ccff,
        emissiveIntensity: 0.2
      });
      const base = new THREE.Mesh(baseGeometry, baseMaterial);
      base.position.y = baseHeight / 2;
      base.castShadow = false;
      base.receiveShadow = true;
      group.add(base);
      
      // 透明玻璃管（细长）
      const tubeGeometry = new THREE.BoxGeometry(tubeWidth, gaugeHeight, tubeDepth);
      const tubeMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.15,
        roughness: 0.05,
        metalness: 0.95,
        side: THREE.DoubleSide
      });
      const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
      tube.position.y = baseHeight + gaugeHeight / 2;
      tube.castShadow = false;
      group.add(tube);
      
      // 发光光柱（根据高度）
      const heightRatio = Math.min(totalHeight / maxHeight, 1);
      const lightHeight = gaugeHeight * heightRatio;
      
      if (lightHeight > 0) {
        // 根据高度选择颜色
        let lightColor, emissiveColor;
        if (totalHeight > maxHeight * 0.8) {
          lightColor = 0xff6b6b;  // 红色
          emissiveColor = 0xff0000;
        } else if (totalHeight > maxHeight * 0.5) {
          lightColor = 0xffd93d;  // 黄色
          emissiveColor = 0xffaa00;
        } else {
          lightColor = 0x4ade80;  // 绿色
          emissiveColor = 0x00ff88;
        }
        
        const lightGeometry = new THREE.BoxGeometry(tubeWidth * 0.7, lightHeight, tubeDepth * 0.7);
        const lightMaterial = new THREE.MeshStandardMaterial({
          color: lightColor,
          transparent: true,
          opacity: 0.8,
          roughness: 0.1,
          metalness: 0.3,
          emissive: emissiveColor,
          emissiveIntensity: 0.6
        });
        const lightBar = new THREE.Mesh(lightGeometry, lightMaterial);
        lightBar.position.y = baseHeight + lightHeight / 2;
        group.add(lightBar);
        
        // 顶部发光点
        const topLightGeometry = new THREE.SphereGeometry(tubeWidth * 0.8, 16, 16);
        const topLightMaterial = new THREE.MeshStandardMaterial({
          color: lightColor,
          transparent: true,
          opacity: 0.9,
          emissive: emissiveColor,
          emissiveIntensity: 1.0
        });
        const topLight = new THREE.Mesh(topLightGeometry, topLightMaterial);
        topLight.position.y = baseHeight + lightHeight;
        group.add(topLight);
      }
      
      // 简洁的数值标签（亮色透明背景）
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      
      // 透明背景，亮色边框
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.fillRect(0, 0, 256, 128);
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, 254, 126);
      
      // 数值（亮色）
      ctx.fillStyle = '#38bdf8';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${Math.round(totalHeight)}`, 128, 50);
      
      ctx.fillStyle = '#88ccff';
      ctx.font = '28px Arial';
      ctx.fillText('cm', 128, 90);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const labelMaterial = new THREE.SpriteMaterial({ 
        map: texture,
        transparent: true,
        opacity: 0.95
      });
      const labelSprite = new THREE.Sprite(labelMaterial);
      labelSprite.scale.set(35, 18, 1);
      labelSprite.position.set(0, baseHeight + Math.min(totalHeight, maxHeight) + 25, tubeDepth / 2 + 8);
      group.add(labelSprite);
      
      return group;
    }

    // 创建箱子（带编号）
    function createBox(box) {
      const group = new THREE.Group();
      
      // 箱子主体
      const geometry = new THREE.BoxGeometry(box.length, box.height, box.width);
      const material = new THREE.MeshStandardMaterial({
        color: box.color || 0x4ade80,
        roughness: 0.4,
        metalness: 0.1,
        transparent: true,
        opacity: 0.92
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);

      // 边框线
      const edges = new THREE.EdgesGeometry(geometry);
      const lineMaterial = new THREE.LineBasicMaterial({ 
        color: 0xffffff, 
        transparent: true, 
        opacity: 0.3 
      });
      const wireframe = new THREE.LineSegments(edges, lineMaterial);
      group.add(wireframe);

      // 编号标签
      if (box.number) {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, 128, 64);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, 124, 60);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`#${box.number}`, 64, 32);
        
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(Math.min(box.length * 0.5, 20), Math.min(box.length * 0.25, 10), 1);
        sprite.position.y = box.height / 2 + 8;
        group.add(sprite);
      }

      return group;
    }

    // 数据
    let pallets = [];
    let boxes = [];

    // 加载数据
    function loadData() {
      try {
        const p = localStorage.getItem('pallet-data');
        const b = localStorage.getItem('pallet-boxes-v2');
        
        pallets = p ? JSON.parse(p) : [];
        boxes = b ? JSON.parse(b) : [];
        
        if (!Array.isArray(pallets)) pallets = [];
        if (!Array.isArray(boxes)) boxes = [];
        
        console.log('Loaded data:', { pallets: pallets.length, boxes: boxes.length });
      } catch (e) {
        console.error('加载数据失败', e);
        pallets = [];
        boxes = [];
      }
    }

    // 装箱算法
    function packBoxes(pallet, palletBoxes) {
      const result = [];
      if (!pallet || !pallet.layers || pallet.layers.length === 0) return result;

      const boxesByLayer = {};
      palletBoxes.forEach(box => {
        if (!boxesByLayer[box.layerId]) boxesByLayer[box.layerId] = [];
        boxesByLayer[box.layerId].push(box);
      });

      let currentY = PALLET_HEIGHT;

      pallet.layers.forEach((layer) => {
        const layerBoxes = boxesByLayer[layer.id] || [];
        if (layerBoxes.length === 0) return;

        const cellLength = PALLET_LENGTH / layer.cols;
        const cellWidth = PALLET_WIDTH / layer.rows;

        let maxHeight = 0;
        let boxIndex = 0;

        for (let row = 0; row < layer.rows && boxIndex < layerBoxes.length; row++) {
          for (let col = 0; col < layer.cols && boxIndex < layerBoxes.length; col++) {
            const box = layerBoxes[boxIndex];
            
            const x = -PALLET_LENGTH / 2 + col * cellLength + box.length / 2;
            const z = -PALLET_WIDTH / 2 + row * cellWidth + box.width / 2;
            const y = currentY + box.height / 2;

            result.push({ ...box, x, y, z });
            maxHeight = Math.max(maxHeight, box.height);
            boxIndex++;
          }
        }

        currentY += maxHeight;
      });

      return result;
    }

    // 计算卡板布局位置（平铺排列）
    function calculatePalletPosition(index, totalCount) {
      // 每行最多放3个卡板
      const palletsPerRow = 3;
      const row = Math.floor(index / palletsPerRow);
      const col = index % palletsPerRow;
      
      // 计算位置（考虑卡板尺寸和间距）
      const x = col * (PALLET_LENGTH + PALLET_SPACING);
      const z = row * (PALLET_WIDTH + PALLET_SPACING);
      
      // 居中偏移
      const totalCols = Math.min(totalCount, palletsPerRow);
      const totalRows = Math.ceil(totalCount / palletsPerRow);
      const offsetX = -(totalCols - 1) * (PALLET_LENGTH + PALLET_SPACING) / 2;
      const offsetZ = -(totalRows - 1) * (PALLET_WIDTH + PALLET_SPACING) / 2;
      
      return { x: x + offsetX, z: z + offsetZ };
    }

    // 创建射灯（为有箱子的卡板）- 增强亮度
    function createSpotLight(palletHeight) {
      // 主射灯 - 高强度白色
      const spotLight = new THREE.SpotLight(0xffffff, 8, 600, Math.PI / 4, 0.2, 1);
      spotLight.position.set(0, palletHeight + 200, 0);
      spotLight.target.position.set(0, palletHeight / 2, 0);
      spotLight.castShadow = true;
      spotLight.shadow.mapSize.width = 2048;
      spotLight.shadow.mapSize.height = 2048;
      spotLight.shadow.camera.near = 0.5;
      spotLight.shadow.camera.far = 800;
      spotLight.shadow.camera.fov = 45;
      spotLight.angle = Math.PI / 3;
      spotLight.penumbra = 0.3;
      spotLight.decay = 1;
      
      return spotLight;
    }

    // 创建点光源（增强整体亮度）
    function createPointLight(palletHeight) {
      const pointLight = new THREE.PointLight(0xffffff, 5, 500, 1);
      pointLight.position.set(0, palletHeight + 150, 0);
      return pointLight;
    }

    // 创建发光平面（模拟地面光晕）
    function createGlowPlane() {
      const geometry = new THREE.CircleGeometry(Math.max(PALLET_LENGTH, PALLET_WIDTH) * 0.8, 32);
      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      });
      const plane = new THREE.Mesh(geometry, material);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = 0.5;
      return plane;
    }

    // 渲染场景
    function renderScene() {
      // 清空卡板组
      while (palletsGroup.children.length > 0) {
        const child = palletsGroup.children[0];
        palletsGroup.remove(child);
      }

      if (pallets.length === 0) {
        updateInfo();
        return;
      }

      // 渲染每个卡板
      pallets.forEach((pallet, index) => {
        const palletContainer = new THREE.Group();
        
        // 计算位置
        const pos = calculatePalletPosition(index, pallets.length);
        palletContainer.position.set(pos.x, 0, pos.z);
        
        // 创建卡板
        const palletMesh = createPallet();
        palletContainer.add(palletMesh);
        
        // 创建卡板标签（放在卡板前方）
        const label = createPalletLabel(pallet.name, index);
        label.position.set(0, 50, -PALLET_WIDTH / 2 - 40);
        palletContainer.add(label);
        
        // 获取该卡板的箱子
        const palletBoxes = boxes.filter(b => b.palletId === pallet.id);
        
        // 装箱并渲染箱子
        const packedBoxes = packBoxes(pallet, palletBoxes);
        packedBoxes.forEach(box => {
          const boxMesh = createBox(box);
          boxMesh.position.set(box.x, box.y, box.z);
          palletContainer.add(boxMesh);
        });
        
        // 计算该卡板的总高度
        let maxY = PALLET_HEIGHT;
        packedBoxes.forEach(box => {
          const topY = box.y + box.height / 2;
          maxY = Math.max(maxY, topY);
        });
        
        // 如果有箱子，添加强光照明
        if (packedBoxes.length > 0) {
          // 主射灯（上方）
          const spotLight = createSpotLight(maxY);
          palletContainer.add(spotLight);
          palletContainer.add(spotLight.target);
          
          // 点光源（增强整体亮度）
          const pointLight = createPointLight(maxY);
          palletContainer.add(pointLight);
          
          // 多个辅助射灯（从不同角度）
          const fillSpot1 = new THREE.SpotLight(0xffffff, 3, 400, Math.PI / 5, 0.4, 1);
          fillSpot1.position.set(-PALLET_LENGTH / 2 - 80, maxY + 120, 0);
          fillSpot1.target.position.set(0, maxY / 2, 0);
          palletContainer.add(fillSpot1);
          palletContainer.add(fillSpot1.target);
          
          const fillSpot2 = new THREE.SpotLight(0xffffff, 3, 400, Math.PI / 5, 0.4, 1);
          fillSpot2.position.set(PALLET_LENGTH / 2 + 80, maxY + 120, 0);
          fillSpot2.target.position.set(0, maxY / 2, 0);
          palletContainer.add(fillSpot2);
          palletContainer.add(fillSpot2.target);
          
          // 发光平面（地面光晕效果）
          const glowPlane = createGlowPlane();
          palletContainer.add(glowPlane);
        }
        
        // 创建高度计（放在卡板右侧）
        const heightGauge = createHeightGauge(maxY);
        heightGauge.position.set(PALLET_LENGTH / 2 + 30, 0, 0);
        palletContainer.add(heightGauge);
        
        palletsGroup.add(palletContainer);
      });

      // 更新信息
      updateInfo();
      
      // 调整相机视角以适应所有卡板
      adjustCamera();
    }

    // 调整相机视角
    function adjustCamera() {
      if (pallets.length === 0) {
        controls.target.set(0, 20, 0);
        return;
      }
      
      // 计算所有卡板的中心和范围
      const palletsPerRow = 3;
      const totalCols = Math.min(pallets.length, palletsPerRow);
      const totalRows = Math.ceil(pallets.length / palletsPerRow);
      
      const totalWidth = totalCols * (PALLET_LENGTH + PALLET_SPACING);
      const totalDepth = totalRows * (PALLET_WIDTH + PALLET_SPACING);
      
      // 相机目标放在中心
      controls.target.set(0, PALLET_HEIGHT, 0);
      
      // 根据卡板数量调整相机距离
      const maxDimension = Math.max(totalWidth, totalDepth);
      const distance = Math.max(300, maxDimension * 1.2);
      
      camera.position.set(distance * 0.8, distance * 0.6, distance * 0.8);
    }

    // 更新信息面板
    function updateInfo() {
      document.getElementById('pallet-count').textContent = pallets.length;
      document.getElementById('box-count').textContent = boxes.length;
      
      const listEl = document.getElementById('pallet-list');
      if (pallets.length === 0) {
        listEl.innerHTML = '<div style="color: #64748b; font-size: 12px;">暂无卡板</div>';
        return;
      }
      
      listEl.innerHTML = pallets.map((p, i) => {
        const palletBoxes = boxes.filter(b => b.palletId === p.id);
        const layerCount = p.layers ? p.layers.length : 0;
        return `
          <div class="pallet-item">
            <div class="pallet-item-name">${p.name}</div>
            <div class="pallet-item-info">${layerCount} 层 | ${palletBoxes.length} 箱</div>
          </div>
        `;
      }).join('');
    }

    // 控制器
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, PALLET_HEIGHT / 2 + 20, 0);
    controls.minDistance = 100;
    controls.maxDistance = 2000;
    
    // 自动旋转控制
    let isAutoRotating = false;
    let rotationSpeed = 1.0;
    
    // 切换自动旋转
    window.toggleRotation = function() {
      isAutoRotating = !isAutoRotating;
      controls.autoRotate = isAutoRotating;
      const btn = document.getElementById('rotation-toggle');
      if (isAutoRotating) {
        btn.textContent = '旋转中';
        btn.classList.remove('inactive');
        btn.classList.add('active');
      } else {
        btn.textContent = '停止';
        btn.classList.remove('active');
        btn.classList.add('inactive');
      }
    };
    
    // 更新旋转速度
    window.updateRotationSpeed = function(value) {
      rotationSpeed = parseFloat(value);
      controls.autoRotateSpeed = rotationSpeed * 2.0; // 基础速度是2.0
      document.getElementById('speed-value').textContent = rotationSpeed.toFixed(1) + 'x';
    };

    // 窗口大小调整
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    // 数据同步
    function syncData() {
      loadData();
      renderScene();
    }

    // 初始化
    loadData();
    renderScene();
    document.getElementById('loading').style.display = 'none';

    // 监听数据更新
    window.addEventListener('storage', (e) => {
      if (e.key === 'pallet-data' || e.key === 'pallet-boxes-v2' || e.key === 'pallet-update') {
        syncData();
      }
    });

    // 定时检查更新
    let lastPalletData = localStorage.getItem('pallet-data');
    let lastBoxData = localStorage.getItem('pallet-boxes-v2');
    let lastUpdate = localStorage.getItem('pallet-update');
    
    setInterval(() => {
      const currentPalletData = localStorage.getItem('pallet-data');
      const currentBoxData = localStorage.getItem('pallet-boxes-v2');
      const currentUpdate = localStorage.getItem('pallet-update');
      
      if (currentPalletData !== lastPalletData || 
          currentBoxData !== lastBoxData || 
          currentUpdate !== lastUpdate) {
        lastPalletData = currentPalletData;
        lastBoxData = currentBoxData;
        lastUpdate = currentUpdate;
        syncData();
      }
    }, 300);

    // 动画循环
    function animate() {
      requestAnimationFrame(animate);
      
      // 更新自动旋转
      if (isAutoRotating) {
        controls.autoRotateSpeed = rotationSpeed * 2.0;
      }
      
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
