<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰元素 */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: float 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 25s ease-in-out infinite reverse;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-in;
            position: relative;
            z-index: 1;
            /* 毛玻璃效果 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        #output {
            font-size: 2em;
            color: #ffffff;
            padding: 30px 60px;
            /* 毛玻璃效果 */
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.8s ease-out;
            position: relative;
            z-index: 1;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            min-width: 300px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
        }

        #output:active {
            transform: scale(0.95);
        }

        #output.clicked {
            animation: clickEffect 0.6s ease-out;
        }

        #output:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        #output::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 25px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
          
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #output:hover::before {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: translateY(-20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }
            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }

        @keyframes clickEffect {
            0% {
                transform: scale(1);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2),
                            inset 0 1px 0 rgba(255, 255, 255, 0.4),
                            0 0 0 1px rgba(255, 255, 255, 0.1);
            }
            25% {
                transform: scale(1.15) rotate(2deg);
                box-shadow: 0 20px 60px rgba(255, 255, 255, 0.4),
                            inset 0 1px 0 rgba(255, 255, 255, 0.6),
                            0 0 40px rgba(255, 255, 255, 0.5);
                background: rgba(255, 255, 255, 0.35);
            }
            50% {
                transform: scale(1.1) rotate(-2deg);
                box-shadow: 0 15px 50px rgba(255, 215, 0, 0.5),
                            inset 0 1px 0 rgba(255, 255, 255, 0.6),
                            0 0 30px rgba(255, 215, 0, 0.4);
                background: rgba(255, 255, 255, 0.3);
            }
            75% {
                transform: scale(1.05) rotate(1deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2),
                            inset 0 1px 0 rgba(255, 255, 255, 0.4),
                            0 0 0 1px rgba(255, 255, 255, 0.1);
            }
        }

        /* 波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleAnimation 0.8s ease-out;
            pointer-events: none;
        }

        @keyframes rippleAnimation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            animation: particleExplode 1s ease-out forwards;
        }

        @keyframes particleExplode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* 文字闪烁效果 */
        @keyframes textGlow {
            0%, 100% {
                text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8),
                            0 0 60px rgba(255, 215, 0, 0.6),
                            0 2px 10px rgba(0,0,0,0.2);
            }
        }

        #output.text-glow {
            animation: clickEffect 0.6s ease-out, textGlow 0.6s ease-out;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
                padding: 15px 30px;
            }

            #output {
                font-size: 1.5em;
                padding: 25px 40px;
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <h1>JavaScript Hello World</h1>
    
    <!-- 方式1：直接在页面显示 -->
    <div id="output"></div>

    <script>
        // 方式1：在页面中显示
        const output = document.getElementById('output');
        output.textContent = 'Hello World!';

        // 方式2：在控制台显示
        console.log('Hello World!');

        // 点击特效
        output.addEventListener('click', function(e) {
            // 添加点击动画类
            this.classList.add('clicked', 'text-glow');
            
            // 移除动画类（用于重复触发）
            setTimeout(() => {
                this.classList.remove('clicked', 'text-glow');
            }, 600);

            // 创建波纹效果
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            this.appendChild(ripple);

            // 移除波纹元素
            setTimeout(() => {
                ripple.remove();
            }, 800);

            // 创建粒子爆炸效果
            createParticles(e.clientX, e.clientY);

            // 文字变化效果
            const originalText = this.textContent;
            const messages = ['✨ Amazing! ✨', '🌟 Awesome! 🌟', '💫 Fantastic! 💫', '🎉 Wonderful! 🎉', '🚀 Great! 🚀'];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            this.textContent = randomMessage;
            setTimeout(() => {
                this.textContent = originalText;
            }, 1000);
        });

        // 创建粒子效果
        function createParticles(x, y) {
            const particleCount = 20;
            const colors = ['#ffffff', '#ffd700', '#ff6b9d', '#4facfe', '#00f2fe'];
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // 随机颜色
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // 随机位置和方向
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 100 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                // 移除粒子
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }
    </script>
</body>
</html>
